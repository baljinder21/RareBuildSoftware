<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1628"/>
      <stop offset="0.6" stop-color="#13294a"/>
      <stop offset="1" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#33d4aa" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#33d4aa" stop-opacity="1"/>
      <stop offset="1" stop-color="#33d4aa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle accent grid lines (left edge) -->
  <rect x="0" y="0" width="6" height="630" fill="#33d4aa" opacity="0.6"/>

  <!-- Top accent shimmer -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentLine)"/>

  <!-- RBS logo block (top left) -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="12" fill="#33d4aa"/>
    <text x="28" y="38" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="900" fill="#0a1628" text-anchor="middle">RBS</text>
  </g>

  <text x="156" y="119" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Rare Build Software</text>

  <!-- Tag pill (above title) -->
  <g transform="translate(80, 155)">
    <rect width="90" height="36" rx="18" fill="#33d4aa" opacity="0.18" stroke="#33d4aa" stroke-width="1.5"/>
    <text x="45" y="24" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#33d4aa" text-anchor="middle" letter-spacing="2">GUIDE</text>
  </g>

  <!-- Title (multi-line) -->
  <text x="80" y="255" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Windows 11 KB5083769 Update</text>
  <text x="80" y="332" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1.5">What's Really Broken,</text>
  <text x="80" y="409" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1.5">What's Not (May 2026)</text>

  <!-- Date stamp lower-left -->
  <text x="80" y="500" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="600" fill="#aabbcc" opacity="0.85">May 2, 2026 · 9 min read · By Rai</text>

  <!-- Bottom-right domain -->
  <text x="1120" y="580" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="20" font-weight="600" fill="#aabbcc" text-anchor="end" opacity="0.8">rarebuildsoftware.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="628" width="1200" height="2" fill="url(#accentLine)"/>
</svg>
